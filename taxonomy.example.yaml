# ── Minimum keyword matches to pass the relevance filter ────
#  A paper must match at least this many keywords to be included
#  Increase to 2 for stricter filtering, keep at 1 for broader
relevance_threshold: 1


# ── Sources to search ────────────────────────────────────────
sources:
  semantic_scholar: True    # 200M+ academic papers — primary source
  arxiv: False
  openalex: true               # Preprints — catches very latest research


# ── Optional: restrict results to academic fields ───────────
# Drops off-topic papers that share a keyword with your domain.
# Applied to Semantic Scholar (fieldsOfStudy) and OpenAlex (field filter).
# Field names map to OpenAlex field IDs in pipeline.py (OPENALEX_FIELD_IDS).
# Omit or leave empty to disable.
# fields_of_study:
#   - Computer Science
#   - Engineering


# ── How many results to fetch per keyword group per source ───
results_per_query: 20


# ── How many days back to look ───────────────────────────────
#  7 = last 7 days (weekly run)
#  Change to 14 if running fortnightly
lookback_days: 20


# ── Email delivery settings ───────────────────────────────────
email:
  subject_prefix: "[Research Digest]"
  max_papers_in_digest: 30     # Cap so email does not become overwhelming
  show_full_abstract: false    # true = show full abstract, false = show LLM summary only


# ── LLM settings ─────────────────────────────────────────────

llm:
  provider: "groq"              # primary — try this first
  fallback_provider: "google"   # secondary — use if primary fails
  model: "llama-3.3-70b-versatile"
  fallback_model: "gemini-2.0-flash"
  max_tokens: 500
  temperature: 0.1

# llm:
#   provider: "google"              # primary — try this first
#   fallback_provider: "groq"   # secondary — use if primary fails
#   model: "gemini-2.0-flash"
#   fallback_model: "llama-3.3-70b-versatile"
#   max_tokens: 500
#   temperature: 0.1

# ── Adding your own topics ───────────────────────────────────
# Replace the topics above with whatever taxonomy suits your work.
# Each top-level key under `topics:` is a group; list the search
# keywords or phrases beneath it. Example shape:
#
# topics:
#   my_topic_group:
#     - keyword one
#     - keyword two
#     - "a multi word phrase"
