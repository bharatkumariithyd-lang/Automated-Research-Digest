# ============================================================
#  taxonomy.yaml
#  Literature & Patent Mining Pipeline — Search Taxonomy
#
#  HOW TO USE:
#  - Add or remove keywords under any section freely
#  - The pipeline reads this file every Monday automatically
#  - More specific keywords = fewer but more relevant results
#  - Broader keywords = more results but more noise
#
#  This example uses AI / ML / DL topics.
#  Replace the topics below with whatever taxonomy suits your domain.
# ============================================================


# ── Topics to search in paper titles and abstracts ──────────
topics:

  ai_fundamentals:
    - artificial intelligence
    - machine learning
    - deep learning
    - neural network
    - foundation model
    - large language model
    - LLM
    - transformer architecture

